name: Inkfall
options:
  bundleIdPrefix: com.wasteland
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "1.0.0"

targets:
  Inkfall:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Inkfall
      - path: Resources/Assets.xcassets
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - sdk: AppKit.framework
      - sdk: AVFoundation.framework
      - sdk: ApplicationServices.framework
      - sdk: Carbon.framework
      # On-device rewrite via Apple Intelligence (FoundationModels ships with
      # macOS 26, the deployment minimum, so linked normally).
      - sdk: FoundationModels.framework
    info:
      path: Generated/Info.plist
      properties:
        CFBundleName: Inkfall
        CFBundleDisplayName: Inkfall
        # Required by the distribution pipeline; Inkfall is a menu-bar utility.
        LSApplicationCategoryType: public.app-category.utilities
        # Menu-bar / agent app: no Dock icon (matches NSApp .accessory policy).
        LSUIElement: true
        # Required so the microphone permission prompt shows a real reason and the
        # grant persists to this app's bundle identifier.
        NSMicrophoneUsageDescription: "Inkfall transcribes your speech into text entirely on this Mac. Audio never leaves your device."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wasteland.Inkfall
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Same fix as Package.swift: the beta OS crashes on Swift 6's dynamic
        # actor-isolation runtime assertion for @objc @MainActor AppKit actions.
        OTHER_SWIFT_FLAGS: "-disable-dynamic-actor-isolation"
        # Automatic signing; set your own team in Xcode, or keep a local overlay spec
        # (e.g. project.local.yml including this file and adding DEVELOPMENT_TEAM) and
        # generate with `xcodegen generate --spec project.local.yml`.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        # Notarization requires the Hardened Runtime. Non-sandboxed (see entitlements)
        # so Accessibility-based text insertion keeps working.
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Inkfall.entitlements
