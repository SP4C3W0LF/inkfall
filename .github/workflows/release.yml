name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and package only — no notarization, no release"
        type: boolean
        default: true

permissions:
  contents: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    # Hard gate: never run for forks, only for the canonical repo.
    if: github.repository == 'SP4C3W0LF/inkfall'
    runs-on: [self-hosted, macOS, inkfall]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Build and package
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            "$HOME/inkfall-release/ci-release.sh" "0.0.0-ci" --dry-run
          else
            "$HOME/inkfall-release/ci-release.sh" "${GITHUB_REF_NAME#v}"
          fi

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "dist/Inkfall.dmg" \
            --title "Inkfall ${GITHUB_REF_NAME#v}" \
            --generate-notes
